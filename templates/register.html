<!DOCTYPE html>
<html lang="vi">
<head>
        <meta charset="utf-8">
        <title>Fruitables - Vegetable Website Template</title>
        <meta content="width=device-width, initial-scale=1.0" name="viewport">
        <meta content="" name="keywords">
        <meta content="" name="description">

        <!-- Google Web Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Raleway:wght@600;800&display=swap" rel="stylesheet"> 

        <!-- Icon Font Stylesheet -->
        <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

        <!-- Libraries Stylesheet -->
        <link href="/static/lib/lightbox/css/lightbox.min.css" rel="stylesheet">
        <link href="/static/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">


        <!-- Customized Bootstrap Stylesheet -->
        <link href="/static/css/bootstrap.min.css" rel="stylesheet">

        <!-- Template Stylesheet -->
        <link href="/static/css/register.css" rel="stylesheet">
    </head>
<body>

    <div class="register-container">
        <a href="#" class="brand-logo">Fruitables</a>
        <h2>Cửa hàng <span>thực phẩm sạch</span></h2>

        <form id="registerForm">
            <div class="form-group">
                <label>Tên người dùng</label>
                <input type="text" id="username" placeholder="Họ và tên" required>
                </div> 
            <div class="form-group">
                <label>Số điện thoại</label>
                <input type="text" id="phone" placeholder="Số điện thoại" required>
            </div>
            <div class="form-group">
                <label>Địa chỉ</label>
                <input type="text" id="address" placeholder="Nhập địa chỉ của bạn" required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
            </div>

            <div class="terms">
                <input type="checkbox" id="agree" required>
                <label for="agree">Tôi đồng ý với các Điều khoản & Chính sách</label>
            </div>

            <button type="submit" class="btn-register">Đăng Ký Tài Khoản</button>
        </form>
    </div>
</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/lib/easing/easing.min.js"></script>
<script src="/static/lib/waypoints/waypoints.min.js"></script>
<script src="/static/lib/lightbox/js/lightbox.min.js"></script>
<script src="/static/lib/owlcarousel/owl.carousel.min.js"></script>
<script src="/static/js/register.js"></script>
